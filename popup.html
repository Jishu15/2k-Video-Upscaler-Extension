<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1440p Upscaler</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:300px;padding:16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0e0e10;color:#ddd;font-size:13px}
h2{font-size:16px;font-weight:600;margin-bottom:4px;background:linear-gradient(135deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{color:#666;font-size:11px;margin-bottom:14px}
.section{margin-bottom:12px}
.section-label{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat{background:rgba(255,255,255,.04);border-radius:8px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
.stat-label{color:#888}
.stat-value{color:#ddd;font-variant-numeric:tabular-nums}
.setting{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.setting label{color:#888;flex-shrink:0;width:70px;font-size:12px}
.setting input[type="range"]{-webkit-appearance:none;appearance:none;flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.12);outline:none}
.setting input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#667eea;cursor:pointer;border:2px solid rgba(255,255,255,.15)}
.setting .value{color:#999;font-size:12px;width:30px;text-align:right}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.status-dot.active{background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,.4)}
.status-dot.inactive{background:#555}
.toggle-btn{background:rgba(255,255,255,.06);border:none;border-radius:6px;padding:4px 12px;font:500 12px/1 system-ui,sans-serif;cursor:pointer;color:#888;transition:background .15s,color .15s}
.toggle-btn.on{background:rgba(102,126,234,.25);color:#667eea}
.toggle-btn.off{background:rgba(239,68,68,.15);color:#ef4444}
.footer{margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06);font-size:11px;color:#555;text-align:center}
</style>
</head>
<body>
<h2>1440p Upscaler</h2>
<div class="sub">Upscales 720p / 1080p video automatically.</div>

<div class="section">
  <div class="section-label">Status</div>
  <div class="stat">
    <span class="stat-label"><span class="status-dot inactive" id="statusDot"></span><span id="statusText">No videos detected</span></span>
    <span class="stat-value" id="videoCount">0</span>
  </div>
</div>

<div class="section">
  <div class="section-label">Settings</div>
  <div class="setting">
    <label>Upscaler</label>
    <button class="toggle-btn on" id="enableToggle">On</button>
  </div>
  <div class="setting">
    <label>Sharpening</label>
    <input type="range" id="sharpness" min="0" max="100" value="50">
    <span class="value" id="sharpnessVal">50%</span>
  </div>
</div>

<div class="section">
  <div class="section-label">Info</div>
  <div style="font-size:11px;color:#555;line-height:1.5">
    Automatically upscales 720p and 1080p videos to 2560×1440.<br>
    All controls are here in the extension popup.
  </div>
</div>

<div class="footer">
  <span id="version">v1.0.0</span>
</div>

<script src="popup.js"></script>
</body>
</html>
