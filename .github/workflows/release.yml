name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package extension
        run: |
          mkdir -p dist
          zip -r dist/1440p-video-upscaler-${{ github.ref_name }}.zip \
            manifest.json background.js content.js popup.html popup.js styles.css icons/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
